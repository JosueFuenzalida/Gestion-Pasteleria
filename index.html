<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gestion Pasteleria">
  <title>Gestion Pasteleria</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Patrick+Hand&family=JetBrains+Mono:wght@500;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <main class="app">
    <header class="topbar">
      <img id="topbar-banner" class="topbar-banner hidden" alt="">
      <div class="logo-wrap">
        <img id="biz-logo" class="biz-logo hidden" alt="Logo negocio">
        <div id="biz-logo-fallback" class="biz-logo-fallback">PF</div>
      </div>
      <div class="topbar-center">
        <h1 id="biz-name">Pasteleria Fulano</h1>
        <div id="view-title" class="view-subtitle">Agenda de Entregas</div>
      </div>
      <button id="top-menu-btn" class="icon-btn" aria-label="Menu rapido">&#8942;</button>
    </header>

    <div id="top-menu" class="top-menu hidden">
      <button id="menu-open-ajustes" class="top-menu-item">Ajustes y Sistema</button>
      <button id="menu-export" class="top-menu-item">Exportar JSON</button>
      <button id="menu-import" class="top-menu-item">Importar Backup</button>
    </div>

    <section id="view-agenda" class="view active">
      <div class="row">
        <button class="chip active" data-filter="hoy">Hoy</button>
        <button class="chip" data-filter="manana">Manana</button>
        <button class="chip" data-filter="rango">Rango</button>
      </div>
      <div id="agenda-range" class="row hidden">
        <input id="agenda-from" type="date">
        <input id="agenda-to" type="date">
      </div>
      <div id="agenda-list" class="stack"></div>
    </section>

    <section id="view-pedido" class="view">
      <div class="card">
        <h2>Selector de Productos</h2>
        <div id="producto-accordion" class="stack"></div>
      </div>

      <div class="card">
        <h2>Resumen de Venta</h2>
        <div id="resumen-items" class="stack"></div>
        <div class="grid-2">
          <input id="transporte" type="number" min="0" step="1" placeholder="Costo transporte $">
          <input id="descuento" type="number" min="0" step="1" placeholder="Descuento">
        </div>
        <div class="grid-2">
          <div class="discount-switch" role="group" aria-label="Tipo descuento">
            <button id="discount-mode-money" class="discount-mode active" type="button">$</button>
            <button id="discount-mode-percent" class="discount-mode" type="button">%</button>
          </div>
          <div class="total" id="total-pagar">$ 0</div>
        </div>
      </div>

      <div class="card">
        <h2>Datos del Cliente</h2>
        <input id="pedido-cliente" type="text" placeholder="Buscar cliente">
        <div id="cliente-suggestions" class="suggestions"></div>
        <div class="grid-2">
          <input id="pedido-fecha" type="date">
          <input id="pedido-hora" type="time">
        </div>
        <input id="pedido-direccion" type="text" placeholder="Direccion de despacho">
        <div class="grid-2">
          <input id="pedido-lat" type="number" step="any" placeholder="Latitud">
          <input id="pedido-lon" type="number" step="any" placeholder="Longitud">
        </div>
        <button id="capturar-gps" class="btn">Capturar GPS Actual</button>
        <button id="confirmar-pedido" class="btn primary">CONFIRMAR Y AGENDAR</button>
      </div>
    </section>

    <section id="view-catalogo" class="view">
      <div class="card">
        <h2>Catalogo Actual</h2>
        <div id="catalogo-lista" class="stack"></div>
      </div>
    </section>

    <section id="view-compras" class="view">
      <div class="card">
        <h2>Generador de Lista</h2>
        <div class="grid-2">
          <input id="compras-from" type="date">
          <input id="compras-to" type="date">
        </div>
        <button id="generar-lista" class="btn">Generar consolidado</button>
        <div id="pedidos-incluidos" class="stack"></div>
      </div>
      <div class="card">
        <h2>Resultado del Consolidado</h2>
        <div id="consolidado" class="stack"></div>
      </div>
      <div class="card">
        <button id="copiar-whatsapp" class="btn primary">COPIAR TEXTO WHATSAPP</button>
      </div>
    </section>

    <section id="view-clientes" class="view">
      <div class="card">
        <input id="buscar-cliente" type="text" placeholder="Buscador general">
      </div>
      <div class="card">
        <h2>Lista de Clientes</h2>
        <div id="clientes-lista" class="stack"></div>
      </div>
    </section>

    <section id="view-ajustes" class="view">
      <div class="card">
        <h2>Identidad del Negocio</h2>
        <input id="cfg-biz-name" type="text" placeholder="Nombre negocio (ej: Pasteleria Fulano)">
        <label style="display:block;margin-top:8px;color:var(--text-muted);font-size:16px;">Logo (esquina superior)</label>
        <input id="cfg-logo-file" type="file" accept="image/*">
        <label style="display:block;margin-top:8px;color:var(--text-muted);font-size:16px;">Banner de header (440×72 px recomendado)</label>
        <input id="cfg-banner-file" type="file" accept="image/*">
        <button id="cfg-banner-clear" class="btn" style="margin-top:6px;">Quitar banner</button>
      </div>
      <div class="card">
        <h2>Personalizacion Visual</h2>
        <select id="cfg-theme">
          <option value="azul">Tema Azul</option>
          <option value="verde">Tema Verde</option>
        </select>
        <label style="display:block;margin-top:10px;color:var(--text-muted);font-size:16px;">Tamaño de fuente</label>
        <div class="font-scale-row">
          <span style="font-size:14px">A</span>
          <input id="cfg-font-scale" type="range" min="0.8" max="1.2" step="0.05" value="1">
          <span style="font-size:20px">A</span>
          <span class="font-scale-label" id="font-scale-display">100%</span>
        </div>
      </div>
      <div class="card">
        <h2>Categorias de Productos</h2>
        <div id="categorias-lista" class="stack"></div>
        <div class="row" style="margin-top:8px;">
          <input id="nueva-categoria-input" type="text" placeholder="Nueva categoría...">
          <button id="agregar-categoria" class="btn">+ Agregar</button>
        </div>
      </div>
      <div class="card">
        <h2>Respaldo Local</h2>
        <div class="row">
          <button id="export-json" class="btn">Exportar JSON</button>
          <button id="import-json" class="btn">Importar backup</button>
          <input id="import-file" type="file" accept=".json" class="hidden">
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="bottom-item active" data-view="agenda">
      <span class="bottom-ico">&#128197;</span>
      <span class="bottom-label">Agenda</span>
    </button>
    <button class="bottom-item" data-view="catalogo">
      <span class="bottom-ico">&#127856;</span>
      <span class="bottom-label">Catalogo</span>
    </button>
    <button class="bottom-item primary-center" data-view="pedido">
      <span class="bottom-ico">&#9998;</span>
      <span class="bottom-label">Nuevo Pedido</span>
    </button>
    <button class="bottom-item" data-view="compras">
      <span class="bottom-ico">&#128722;</span>
      <span class="bottom-label">Compras</span>
    </button>
    <button class="bottom-item" data-view="clientes">
      <span class="bottom-ico">&#128101;</span>
      <span class="bottom-label">Clientes</span>
    </button>
  </nav>

  <button id="view-fab" class="view-fab hidden">+</button>

  <div id="modal-shell" class="modal-shell hidden">
    <div class="modal-card">
      <div class="modal-title" id="modal-title">Titulo</div>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn">Cancelar</button>
        <button id="modal-confirm" class="btn primary">Aceptar</button>
      </div>
    </div>
  </div>

  <template id="tpl-cliente-form">
    <div class="grid-2">
      <input id="cli-nombre" type="text" placeholder="Nombre">
      <input id="cli-fono" type="text" placeholder="Telefono">
    </div>
    <input id="cli-dir" type="text" placeholder="Direccion frecuente">
    <div class="grid-2">
      <input id="cli-lat" type="number" step="any" placeholder="Lat frecuente">
      <input id="cli-lon" type="number" step="any" placeholder="Lon frecuente">
    </div>
  </template>

  <template id="tpl-producto-form">
    <div class="product-grid">
      <input id="prod-nombre" type="text" placeholder="Nombre">
      <select id="prod-unidad">
        <option value="un">Un. de venta (un)</option>
        <option value="kg">Un. de venta (kg)</option>
        <option value="gr">Un. de venta (gr)</option>
        <option value="lt">Un. de venta (lt)</option>
        <option value="ml">Un. de venta (ml)</option>
      </select>
      <input id="prod-precio" type="number" min="0" step="1" placeholder="Precio venta">
      <select id="prod-cat">
        <option>DULCE</option>
        <option>SALADO</option>
        <option>COCTELERIA / OTROS</option>
      </select>
    </div>
    <div class="grid-2">
      <input id="prod-foto" type="file" accept="image/*">
      <div id="foto-preview" class="photo-preview">Sin foto</div>
    </div>
    <h3>Desglose de Materiales (Receta)</h3>
    <div class="grid-2">
      <input id="mat-search" type="text" placeholder="Agregar material...">
      <button id="nuevo-material" class="btn">+ Nuevo Material</button>
    </div>
    <div id="mat-suggestions" class="suggestions"></div>
    <div class="material-header">
      <div>Material</div>
      <div>Cantidad</div>
      <div>Unidad</div>
      <div>Costo U.</div>
      <div></div>
    </div>
    <div id="tabla-receta" class="stack"></div>
    <div id="receta-total" class="recipe-total">Costo receta: $ 0</div>
  </template>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
